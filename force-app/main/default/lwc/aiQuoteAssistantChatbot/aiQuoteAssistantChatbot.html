<template>
    <div class="chatbot-main-container">
        <!-- Gradient Background Overlay -->
        <div class="gradient-overlay"></div>
        
        <!-- Main Content Wrapper -->
        <div class="content-wrapper">
            <!-- Header Section -->
            <header class="chatbot-header">
                <div class="header-brand">
                    <div class="brand-icon">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="brand-text">
                        <h1 class="brand-title">CPQ Quote Assistant</h1>
                        <span class="brand-subtitle">Powered by Gemini AI</span>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="header-btn" onclick={handleToggleTheme} title="Toggle Theme">
                        <lightning-icon icon-name={themeIcon} size="x-small"></lightning-icon>
                    </button>
                    <button class="header-btn" onclick={handleClearChat} title="Clear Chat">
                        <lightning-icon icon-name="utility:refresh" size="x-small"></lightning-icon>
                    </button>
                </div>
            </header>

            <!-- Main Split Layout -->
            <div class="split-layout">
                <!-- Left Panel: Chat -->
                <section class="chat-panel">
                    <div class="panel-header">
                        <div class="panel-title-wrapper">
                            <div class="panel-icon chat-icon">
                                <svg viewBox="0 0 24 24" fill="none">
                                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                            <span class="panel-title">Conversation</span>
                        </div>
                        <div class="status-indicator">
                            <span class={statusDotClass}></span>
                            <span class="status-text">{connectionStatus}</span>
                        </div>
                    </div>

                    <!-- Messages Container -->
                    <div class="messages-container" data-id="messagesContainer">
                        <template for:each={messages} for:item="msg">
                            <div key={msg.id} class={msg.wrapperClass}>
                                <!-- Avatar -->
                                <div class={msg.avatarClass}>
                                    <template if:true={msg.isBot}>
                                        <svg viewBox="0 0 24 24" fill="none">
                                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                                            <path d="M8 14s1.5 2 4 2 4-2 4-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                            <line x1="9" y1="9" x2="9.01" y2="9" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                                            <line x1="15" y1="9" x2="15.01" y2="9" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                                        </svg>
                                    </template>
                                    <template if:true={msg.isUser}>
                                        <svg viewBox="0 0 24 24" fill="none">
                                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                            <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                    </template>
                                </div>

                                <!-- Message Content -->
                                <div class={msg.bubbleClass}>
                                    <!-- Welcome Message Special Content -->
                                    <template if:true={msg.isWelcome}>
                                        <p class="welcome-greeting">{msg.text}</p>
                                        <div class="capability-cards">
                                            <div class="capability-card">
                                                <span class="capability-icon">🛒</span>
                                                <span class="capability-text">Add products</span>
                                            </div>
                                            <div class="capability-card">
                                                <span class="capability-icon">💰</span>
                                                <span class="capability-text">Apply discounts</span>
                                            </div>
                                            <div class="capability-card">
                                                <span class="capability-icon">📊</span>
                                                <span class="capability-text">Get summaries</span>
                                            </div>
                                            <div class="capability-card">
                                                <span class="capability-icon">✏️</span>
                                                <span class="capability-text">Update quantities</span>
                                            </div>
                                        </div>
                                        <p class="try-saying">Try saying:</p>
                                        <div class="suggestion-chips">
                                            <template for:each={suggestionChips} for:item="chip">
                                                <button key={chip.id} class="suggestion-chip" onclick={handleSuggestionClick} data-text={chip.text}>
                                                    {chip.text}
                                                </button>
                                            </template>
                                        </div>
                                    </template>

                                    <!-- Regular Message Content -->
                                    <template if:false={msg.isWelcome}>
                                        <p class="message-text">{msg.text}</p>
                                        
                                        <!-- Action Badge -->
                                        <template if:true={msg.actionBadge}>
                                            <div class="action-badge">
                                                <span class={msg.actionBadgeClass}>{msg.actionBadge}</span>
                                            </div>
                                        </template>
                                    </template>

                                    <!-- Timestamp -->
                                    <span class="message-time">{msg.timestamp}</span>
                                </div>
                            </div>
                        </template>

                        <!-- Typing Indicator -->
                        <template if:true={isLoading}>
                            <div class="message-wrapper bot">
                                <div class="message-avatar bot-avatar">
                                    <svg viewBox="0 0 24 24" fill="none">
                                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                                        <path d="M8 14s1.5 2 4 2 4-2 4-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                        <line x1="9" y1="9" x2="9.01" y2="9" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                                        <line x1="15" y1="9" x2="15.01" y2="9" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                                    </svg>
                                </div>
                                <div class="message-bubble bot-bubble typing-bubble">
                                    <div class="typing-indicator">
                                        <span class="typing-dot"></span>
                                        <span class="typing-dot"></span>
                                        <span class="typing-dot"></span>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>

                    <!-- Input Area -->
                    <div class="input-area">
                        <div class="input-container">
                            <textarea
                                class="chat-textarea"
                                placeholder="Ask me about products, discounts, or quotes..."
                                value={inputValue}
                                onkeydown={handleKeyDown}
                                oninput={handleInputChange}
                                rows="1"
                                data-id="chatInput"></textarea>
                            <div class="input-actions">
                                <button class="send-button" onclick={handleSendMessage} disabled={isSendDisabled}>
                                    <svg viewBox="0 0 24 24" fill="none">
                                        <line x1="22" y1="2" x2="11" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        <polygon points="22 2 15 22 11 13 2 9 22 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <p class="input-hint">Press Enter to send • Shift+Enter for new line</p>
                    </div>
                </section>

                <!-- Right Panel: Cart Summary -->
                <section class="cart-panel">
                    <div class="panel-header">
                        <div class="panel-title-wrapper">
                            <div class="panel-icon cart-icon">
                                <svg viewBox="0 0 24 24" fill="none">
                                    <circle cx="9" cy="21" r="1" stroke="currentColor" stroke-width="2"/>
                                    <circle cx="20" cy="21" r="1" stroke="currentColor" stroke-width="2"/>
                                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                            <span class="panel-title">Quote Cart</span>
                        </div>
                        <div class="cart-badge">
                            <span class="cart-count">{cartItemCount}</span>
                        </div>
                    </div>

                    <!-- Cart Items -->
                    <div class="cart-items-container">
                        <template if:true={hasCartItems}>
                            <div class="cart-items-list">
                                <template for:each={cartItems} for:item="item">
                                    <div key={item.id} class="cart-item">
                                        <div class="cart-item-header">
                                            <span class="cart-item-name">{item.productName}</span>
                                            <button class="remove-item-btn" onclick={handleRemoveItem} data-id={item.productId} title="Remove item">
                                                <svg viewBox="0 0 24 24" fill="none" width="14" height="14">
                                                    <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                                    <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                                </svg>
                                            </button>
                                        </div>
                                        <div class="cart-item-details">
                                            <div class="cart-item-row">
                                                <span class="detail-label">Quantity:</span>
                                                <span class="detail-value">{item.quantity}</span>
                                            </div>
                                            <div class="cart-item-row">
                                                <span class="detail-label">Unit Price:</span>
                                                <span class="detail-value">{item.formattedUnitPrice}</span>
                                            </div>
                                            <template if:true={item.hasDiscount}>
                                                <div class="cart-item-row discount-row">
                                                    <span class="detail-label">Discount:</span>
                                                    <span class="detail-value discount-value">-{item.discountPercent}%</span>
                                                </div>
                                            </template>
                                            <div class="cart-item-row total-row">
                                                <span class="detail-label">Line Total:</span>
                                                <span class="detail-value line-total">{item.formattedLineTotal}</span>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <!-- Empty Cart State -->
                        <template if:false={hasCartItems}>
                            <div class="empty-cart">
                                <div class="empty-cart-icon">
                                    <svg viewBox="0 0 24 24" fill="none">
                                        <circle cx="9" cy="21" r="1" stroke="currentColor" stroke-width="1.5"/>
                                        <circle cx="20" cy="21" r="1" stroke="currentColor" stroke-width="1.5"/>
                                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </div>
                                <p class="empty-cart-title">Your cart is empty</p>
                                <p class="empty-cart-text">Ask the AI assistant to add products to your quote</p>
                            </div>
                        </template>
                    </div>

                    <!-- Cart Totals -->
                    <div class="cart-totals">
                        <div class="totals-row">
                            <span class="totals-label">Subtotal</span>
                            <span class="totals-value">{formattedSubtotal}</span>
                        </div>
                        <template if:true={hasDiscounts}>
                            <div class="totals-row discount-total">
                                <span class="totals-label">Total Discount</span>
                                <span class="totals-value discount-value">-{formattedDiscountTotal}</span>
                            </div>
                        </template>
                        <div class="totals-row grand-total">
                            <span class="totals-label">Grand Total</span>
                            <span class="totals-value">{formattedGrandTotal}</span>
                        </div>
                    </div>

                    <!-- Cart Actions -->
                    <div class="cart-actions">
                        <button class="cart-action-btn secondary" onclick={handleClearCart} disabled={isCartEmpty}>
                            <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
                                <polyline points="3 6 5 6 21 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            Clear Cart
                        </button>
                        <button class="cart-action-btn primary" onclick={handleAddToQuote} disabled={isCartEmpty}>
                            <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
                                <path d="M9 11l3 3L22 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            Add to Quote
                        </button>
                    </div>
                </section>
            </div>
        </div>
    </div>
</template>
