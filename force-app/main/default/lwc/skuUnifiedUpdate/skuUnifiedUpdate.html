<template>
    <template if:true={isLoading}>
        <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
    </template>

    <div class="slds-p-around_medium">
        <!-- Page Header -->
        <div class="page-header slds-m-bottom_medium">
            <div class="header-icon">
                <lightning-icon icon-name="utility:edit" size="x-small"></lightning-icon>
            </div>
            <div>
                <h2 class="header-title">Update Product</h2>
                <p class="header-subtitle">Search for a product to update all related records</p>
            </div>
        </div>

        <!-- Product Lookup -->
        <div class="filter-card slds-m-bottom_medium">
            <div class="slds-grid slds-gutters">
                <div class="slds-col slds-size_1-of-2">
                    <c-lookup
                        data-id="unifiedProductLookup"
                        label="Select Product"
                        placeholder="Search by name or code..."
                        is-multi-entry={isNotMultiEntry}
                        onsearch={handleProductSearch}
                        onselectionchange={handleProductSelected}>
                    </c-lookup>
                </div>
            </div>
        </div>

        <!-- Product Selected State -->
        <template if:true={isProductSelected}>
            <!-- Product Banner -->
            <div class="product-banner slds-m-bottom_medium">
                <lightning-icon icon-name="standard:product" size="small" class="slds-m-right_small"></lightning-icon>
                <span class="product-banner__name">{product.Name}</span>
                <span class="product-banner__code">{product.ProductCode}</span>
                <span class={productBannerStatusClass}>{productBannerStatusLabel}</span>
            </div>

            <!-- Save Bar -->
            <template if:true={hasProductChanges}>
                <div class="save-bar slds-m-bottom_medium">
                    <lightning-button label="Save Product &amp; Item Master" variant="brand"
                        icon-name="utility:save" onclick={handleSaveProductFields}
                        class="slds-m-right_small"></lightning-button>
                    <span class="save-bar-text">Unsaved changes in Product / Item Master fields</span>
                    <lightning-button label="Discard" variant="neutral"
                        onclick={handleDiscardChanges} class="slds-m-left_small"></lightning-button>
                </div>
            </template>

            <!-- Accordion Sections -->
            <lightning-accordion allow-multiple-sections-open active-section-name={activeSections}>

                <!-- ======================= Section 1: Product Fields ======================= -->
                <lightning-accordion-section name="productFields" label="Product Fields">
                    <!-- Verticals & Meter Types -->
                    <h4 class="section-subheading">Verticals &amp; Default Meter Types</h4>
                    <template if:false={hasMeterTypeRecord}>
                        <div class="empty-state-inline slds-m-bottom_x-small">
                            <p class="empty-state-text">No Meter Type record found — meter type fields are unavailable.</p>
                        </div>
                    </template>
                    <div class="v-card-grid">
                        <!-- Legal -->
                        <div class={legalCardClass}>
                            <div class="v-card__title">Legal</div>
                            <div class="v-card__fields">
                                <div class="v-card__row">
                                    <span class="v-card__label">Flag</span>
                                    <lightning-combobox label="Flag" value={product.Is_Legal__c}
                                        options={legalOptions} data-field="Is_Legal__c"
                                        onchange={handleProductFieldChange} variant="label-hidden"
                                        class="v-card__combo"></lightning-combobox>
                                </div>
                                <template if:true={hasMeterTypeRecord}>
                                    <div class="v-card__row">
                                        <span class="v-card__label">Meter Type (GBP/EUR)</span>
                                        <lightning-combobox label="Meter Type (GBP/EUR)" value={meterTypeRecord.Legal__c}
                                            options={mtLegalGbpEurOptions} data-field="Legal__c"
                                            onchange={handleMeterTypeFieldChange} variant="label-hidden"
                                            class="v-card__combo"></lightning-combobox>
                                    </div>
                                    <div class="v-card__row">
                                        <span class="v-card__label">Meter Type (USD/AUD)</span>
                                        <lightning-combobox label="Meter Type (USD/AUD)" value={meterTypeRecord.Legal_meter_type_USD_AUD__c}
                                            options={mtLegalUsdAudOptions} data-field="Legal_meter_type_USD_AUD__c"
                                            onchange={handleMeterTypeFieldChange} variant="label-hidden"
                                            class="v-card__combo"></lightning-combobox>
                                    </div>
                                </template>
                            </div>
                        </div>
                        <!-- Accounting -->
                        <div class={accountingCardClass}>
                            <div class="v-card__title">Accounting</div>
                            <div class="v-card__fields">
                                <div class="v-card__row">
                                    <span class="v-card__label">Flag</span>
                                    <lightning-combobox label="Flag" value={product.Is_Accounting__c}
                                        options={accountingOptions} data-field="Is_Accounting__c"
                                        onchange={handleProductFieldChange} variant="label-hidden"
                                        class="v-card__combo"></lightning-combobox>
                                </div>
                                <template if:true={hasMeterTypeRecord}>
                                    <div class="v-card__row">
                                        <span class="v-card__label">Meter Type</span>
                                        <lightning-combobox label="Meter Type" value={meterTypeRecord.meter_type_Accounting__c}
                                            options={mtAccountingOptions} data-field="meter_type_Accounting__c"
                                            onchange={handleMeterTypeFieldChange} variant="label-hidden"
                                            class="v-card__combo"></lightning-combobox>
                                    </div>
                                </template>
                            </div>
                        </div>
                        <!-- Consulting -->
                        <div class={consultingCardClass}>
                            <div class="v-card__title">Consulting</div>
                            <div class="v-card__fields">
                                <div class="v-card__row">
                                    <span class="v-card__label">Flag</span>
                                    <lightning-combobox label="Flag" value={product.Is_Consulting__c}
                                        options={consultingOptions} data-field="Is_Consulting__c"
                                        onchange={handleProductFieldChange} variant="label-hidden"
                                        class="v-card__combo"></lightning-combobox>
                                </div>
                                <template if:true={hasMeterTypeRecord}>
                                    <div class="v-card__row">
                                        <span class="v-card__label">Meter Type</span>
                                        <lightning-combobox label="Meter Type" value={meterTypeRecord.meter_type_Consulting__c}
                                            options={mtConsultingOptions} data-field="meter_type_Consulting__c"
                                            onchange={handleMeterTypeFieldChange} variant="label-hidden"
                                            class="v-card__combo"></lightning-combobox>
                                    </div>
                                </template>
                            </div>
                        </div>
                        <!-- IBA -->
                        <div class={ibaCardClass}>
                            <div class="v-card__title">IBA</div>
                            <div class="v-card__fields">
                                <div class="v-card__row">
                                    <span class="v-card__label">Flag</span>
                                    <lightning-combobox label="Flag" value={product.Is_IBA__c}
                                        options={ibaOptions} data-field="Is_IBA__c"
                                        onchange={handleProductFieldChange} variant="label-hidden"
                                        class="v-card__combo"></lightning-combobox>
                                </div>
                                <template if:true={hasMeterTypeRecord}>
                                    <div class="v-card__row">
                                        <span class="v-card__label">Meter Type</span>
                                        <lightning-combobox label="Meter Type" value={meterTypeRecord.meter_type_IBA__c}
                                            options={mtIbaOptions} data-field="meter_type_IBA__c"
                                            onchange={handleMeterTypeFieldChange} variant="label-hidden"
                                            class="v-card__combo"></lightning-combobox>
                                    </div>
                                </template>
                            </div>
                        </div>
                        <!-- PCM -->
                        <div class={pcmCardClass}>
                            <div class="v-card__title">PCM</div>
                            <div class="v-card__fields">
                                <div class="v-card__row">
                                    <span class="v-card__label">Flag</span>
                                    <lightning-combobox label="Flag" value={product.Is_PCM__c}
                                        options={pcmOptions} data-field="Is_PCM__c"
                                        onchange={handleProductFieldChange} variant="label-hidden"
                                        class="v-card__combo"></lightning-combobox>
                                </div>
                                <template if:true={hasMeterTypeRecord}>
                                    <div class="v-card__row">
                                        <span class="v-card__label">Meter Type</span>
                                        <lightning-combobox label="Meter Type" value={meterTypeRecord.meter_type_PCM__c}
                                            options={mtPcmOptions} data-field="meter_type_PCM__c"
                                            onchange={handleMeterTypeFieldChange} variant="label-hidden"
                                            class="v-card__combo"></lightning-combobox>
                                    </div>
                                </template>
                            </div>
                        </div>
                        <!-- Real Assets -->
                        <div class={realAssetsCardClass}>
                            <div class="v-card__title">Real Assets</div>
                            <div class="v-card__fields">
                                <div class="v-card__row">
                                    <span class="v-card__label">Flag</span>
                                    <lightning-combobox label="Flag" value={product.Is_Real_Assets__c}
                                        options={realAssetsOptions} data-field="Is_Real_Assets__c"
                                        onchange={handleProductFieldChange} variant="label-hidden"
                                        class="v-card__combo"></lightning-combobox>
                                </div>
                                <template if:true={hasMeterTypeRecord}>
                                    <div class="v-card__row">
                                        <span class="v-card__label">Meter Type</span>
                                        <lightning-combobox label="Meter Type" value={meterTypeRecord.meter_type_RealAssets__c}
                                            options={mtRealAssetsOptions} data-field="meter_type_RealAssets__c"
                                            onchange={handleMeterTypeFieldChange} variant="label-hidden"
                                            class="v-card__combo"></lightning-combobox>
                                    </div>
                                </template>
                            </div>
                        </div>
                        <!-- Corporate -->
                        <div class={corporateCardClass}>
                            <div class="v-card__title">Corporate</div>
                            <div class="v-card__fields">
                                <div class="v-card__row">
                                    <span class="v-card__label">Flag</span>
                                    <lightning-combobox label="Flag" value={product.Iss_Corporate__c}
                                        options={corporateOptions} data-field="Iss_Corporate__c"
                                        onchange={handleProductFieldChange} variant="label-hidden"
                                        class="v-card__combo"></lightning-combobox>
                                </div>
                                <template if:true={hasMeterTypeRecord}>
                                    <div class="v-card__row">
                                        <span class="v-card__label">Meter Type</span>
                                        <lightning-combobox label="Meter Type" value={meterTypeRecord.meter_type_Corporate__c}
                                            options={mtCorporateOptions} data-field="meter_type_Corporate__c"
                                            onchange={handleMeterTypeFieldChange} variant="label-hidden"
                                            class="v-card__combo"></lightning-combobox>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>

                    <!-- Product Information -->
                    <h4 class="section-subheading">Product Information</h4>
                    <div class="slds-grid slds-wrap slds-gutters slds-m-bottom_small">
                        <!-- Row 1: Product Name | Product Type | Bundle product -->
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-input variant="label-inline" label="Product Name" value={product.Name}
                                data-field="Name" onchange={handleProductFieldChange} field-level-help={productHelpText.Name}></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-combobox variant="label-inline" label="Product Type" value={product.Product_Type__c}
                                options={productTypeOptions} data-field="Product_Type__c"
                                onchange={handleProductFieldChange} field-level-help={productHelpText.Product_Type__c}></lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-input type="checkbox" variant="label-inline" label="Bundle product"
                                checked={product.Bundle_product__c}
                                data-field="Bundle_product__c"
                                onchange={handleProductFieldChange} field-level-help={productHelpText.Bundle_product__c}></lightning-input>
                        </div>
                        <!-- Row 2: Product Code | Product Line | Includes Assist? -->
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-input variant="label-inline" label="Product Code" value={product.ProductCode}
                                data-field="ProductCode" onchange={handleProductFieldChange} field-level-help={productHelpText.ProductCode}></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-combobox variant="label-inline" label="Product Line" value={product.Product_LineNew__c}
                                options={productLineOptions} data-field="Product_LineNew__c"
                                onchange={handleProductFieldChange} field-level-help={productHelpText.Product_LineNew__c}></lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-input type="checkbox" variant="label-inline" label="Includes Assist?"
                                checked={product.Includes_Assist__c}
                                data-field="Includes_Assist__c"
                                onchange={handleProductFieldChange} field-level-help={productHelpText.Includes_Assist__c}></lightning-input>
                        </div>
                        <!-- Row 3: Active | Business Unit (ro) | Eligible For Premium -->
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-input type="checkbox" variant="label-inline" label="Active" checked={product.IsActive}
                                data-field="IsActive" onchange={handleProductFieldChange} field-level-help={productHelpText.IsActive}></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-input variant="label-inline" label="Business Unit" value={product.Business_Unit_New__c}
                                read-only field-level-help={productHelpText.Business_Unit_New__c}></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-input type="checkbox" variant="label-inline" label="Eligible For Premium"
                                checked={product.Eligible_For_Premium__c}
                                data-field="Eligible_For_Premium__c"
                                onchange={handleProductFieldChange} field-level-help={productHelpText.Eligible_For_Premium__c}></lightning-input>
                        </div>
                        <!-- Row 4: Product Description | Product Rollup -->
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-input variant="label-inline" label="Product Description" value={product.Description}
                                data-field="Description" onchange={handleProductFieldChange} field-level-help={productHelpText.Description}></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-combobox variant="label-inline" label="Product Rollup" value={product.ProductRollup__c}
                                options={productRollupOptions} data-field="ProductRollup__c"
                                onchange={handleProductFieldChange} field-level-help={productHelpText.ProductRollup__c}></lightning-combobox>
                        </div>
                    </div>

                    <!-- Services Product Fields -->
                    <h4 class="section-subheading">Services Product Fields</h4>
                    <div class="slds-grid slds-wrap slds-gutters slds-m-bottom_small">
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-combobox variant="label-inline" label="Services Product Type" value={product.Services_Product_Type__c}
                                options={servicesProductTypeOptions} data-field="Services_Product_Type__c"
                                onchange={handleProductFieldChange} field-level-help={productHelpText.Services_Product_Type__c}></lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-input type="checkbox" variant="label-inline" label="Is Prime"
                                checked={product.Is_Prime__c}
                                data-field="Is_Prime__c"
                                onchange={handleProductFieldChange} field-level-help={productHelpText.Is_Prime__c}></lightning-input>
                        </div>
                    </div>

                    <!-- Pricing -->
                    <h4 class="section-subheading">Pricing</h4>
                    <div class="slds-grid slds-wrap slds-gutters slds-m-bottom_small">
                        <!-- Row 1: Pricing Basis | Product Revenue Type (formula, ro) | Default Pricing Table -->
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-combobox variant="label-inline" label="Pricing Basis" value={product.Pricing_Basis__c}
                                options={pricingBasisOptions} data-field="Pricing_Basis__c"
                                onchange={handleProductFieldChange} field-level-help={productHelpText.Pricing_Basis__c}></lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-input variant="label-inline" label="Product Revenue Type"
                                value={product.Product_Revenue_Type__c}
                                read-only field-level-help={productHelpText.Product_Revenue_Type__c}></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-input variant="label-inline" label="Default Pricing Table"
                                value={product.SBQQ__DefaultPricingTable__c}
                                data-field="SBQQ__DefaultPricingTable__c"
                                onchange={handleProductFieldChange} field-level-help={productHelpText.SBQQ__DefaultPricingTable__c}></lightning-input>
                        </div>
                        <!-- Row 2: Percentage of ACV | Subscription Type | Subscription Term -->
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-input type="number" variant="label-inline" label="Percentage of ACV"
                                value={product.Percentage_of_ACV__c}
                                data-field="Percentage_of_ACV__c"
                                onchange={handleProductFieldChange} step="0.01" field-level-help={productHelpText.Percentage_of_ACV__c}></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-combobox variant="label-inline" label="Subscription Type"
                                value={product.SBQQ__SubscriptionType__c}
                                options={subTypeOptions} data-field="SBQQ__SubscriptionType__c"
                                onchange={handleProductFieldChange} field-level-help={productHelpText.SBQQ__SubscriptionType__c}></lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-input type="number" variant="label-inline" label="Subscription Term"
                                value={product.SBQQ__SubscriptionTerm__c}
                                data-field="SBQQ__SubscriptionTerm__c"
                                onchange={handleProductFieldChange} step="1" field-level-help={productHelpText.SBQQ__SubscriptionTerm__c}></lightning-input>
                        </div>
                        <!-- Row 3: Price Editable | Subscription Pricing | Optional -->
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-input type="checkbox" variant="label-inline" label="Price Editable"
                                checked={product.SBQQ__PriceEditable__c}
                                data-field="SBQQ__PriceEditable__c"
                                onchange={handleProductFieldChange} field-level-help={productHelpText.SBQQ__PriceEditable__c}></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-combobox variant="label-inline" label="Subscription Pricing"
                                value={product.SBQQ__SubscriptionPricing__c}
                                options={subPricingOptions} data-field="SBQQ__SubscriptionPricing__c"
                                onchange={handleProductFieldChange} field-level-help={productHelpText.SBQQ__SubscriptionPricing__c}></lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-input type="checkbox" variant="label-inline" label="Optional"
                                checked={product.SBQQ__Optional__c}
                                data-field="SBQQ__Optional__c"
                                onchange={handleProductFieldChange} field-level-help={productHelpText.SBQQ__Optional__c}></lightning-input>
                        </div>
                        <!-- Row 4: Software License Term -->
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-combobox variant="label-inline" label="Software License Term" value={product.Product_License_Type__c}
                                options={productLicenseTypeOptions} data-field="Product_License_Type__c"
                                onchange={handleProductFieldChange} field-level-help={productHelpText.Product_License_Type__c}></lightning-combobox>
                        </div>
                    </div>

                    <!-- Salesforce CPQ Configuration -->
                    <h4 class="section-subheading">Salesforce CPQ Configuration</h4>
                    <div class="slds-grid slds-wrap slds-gutters slds-m-bottom_small">
                        <!-- Row 1: Configuration Type | Charge Type | Parent Of Bundle -->
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-combobox variant="label-inline" label="Configuration Type" value={product.SBQQ__ConfigurationType__c}
                                options={configTypeOptions} data-field="SBQQ__ConfigurationType__c"
                                onchange={handleProductFieldChange} field-level-help={productHelpText.SBQQ__ConfigurationType__c}></lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-combobox variant="label-inline" label="Charge Type" value={product.SBQQ__ChargeType__c}
                                options={chargeTypeOptions} data-field="SBQQ__ChargeType__c"
                                onchange={handleProductFieldChange} field-level-help={productHelpText.SBQQ__ChargeType__c}></lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-input type="checkbox" variant="label-inline" label="Parent Of Bundle"
                                checked={product.Parent_Of_Bundle__c}
                                data-field="Parent_Of_Bundle__c"
                                onchange={handleProductFieldChange} field-level-help={productHelpText.Parent_Of_Bundle__c}></lightning-input>
                        </div>
                        <!-- Row 2: Configuration Event | Billing Type | Component -->
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-combobox variant="label-inline" label="Configuration Event" value={product.SBQQ__ConfigurationEvent__c}
                                options={configEventOptions} data-field="SBQQ__ConfigurationEvent__c"
                                onchange={handleProductFieldChange} field-level-help={productHelpText.SBQQ__ConfigurationEvent__c}></lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-combobox variant="label-inline" label="Billing Type" value={product.SBQQ__BillingType__c}
                                options={billingTypeOptions} data-field="SBQQ__BillingType__c"
                                onchange={handleProductFieldChange} field-level-help={productHelpText.SBQQ__BillingType__c}></lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-input type="checkbox" variant="label-inline" label="Component"
                                checked={product.SBQQ__Component__c}
                                data-field="SBQQ__Component__c"
                                onchange={handleProductFieldChange} field-level-help={productHelpText.SBQQ__Component__c}></lightning-input>
                        </div>
                        <!-- Row 3: Default Pricing Table | Guided Selling -->
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-input variant="label-inline" label="Default Pricing Table"
                                value={product.SBQQ__DefaultPricingTable__c}
                                data-field="SBQQ__DefaultPricingTable__c"
                                onchange={handleProductFieldChange} field-level-help={productHelpText.SBQQ__DefaultPricingTable__c}></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-combobox variant="label-inline" label="Guided Selling" value={product.Guided_Selling_Type__c}
                                options={guidedSellingTypeOptions} data-field="Guided_Selling_Type__c"
                                onchange={handleProductFieldChange} field-level-help={productHelpText.Guided_Selling_Type__c}></lightning-combobox>
                        </div>
                    </div>

                    <!-- System Information -->
                    <h4 class="section-subheading">System Information</h4>
                    <div class="slds-grid slds-wrap slds-gutters slds-m-bottom_small">
                        <!-- Row 1: Created By | Last Modified By -->
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-input variant="label-inline" label="Created By" value={productCreatedByName}
                                read-only></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                            <lightning-input variant="label-inline" label="Last Modified By" value={productLastModifiedByName}
                                read-only></lightning-input>
                        </div>
