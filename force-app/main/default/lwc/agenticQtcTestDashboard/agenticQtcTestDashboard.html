<template>
    <div class={containerClass}>

        <!-- ══════════════════════════════════════════════════════════════════
             SIDEBAR
             ══════════════════════════════════════════════════════════════════ -->
        <div class="sidebar">

            <!-- Branding -->
            <div class="sidebar-brand">
                <div class="logo-badge">QTC</div>
                <div class="sidebar-title-block">
                    <span class="sidebar-title">Test Runner</span>
                    <span class="sidebar-sub">Playwright CI/CD</span>
                </div>
            </div>

            <!-- Suite selector + action buttons -->
            <div class="sidebar-controls">
                <div class="suite-select-wrap">
                    <label class="field-label">Test Suite</label>
                    <div class="custom-select-outer">
                        <select class="custom-select" onchange={handleSuiteChange} disabled={isRunning}>
                            <template for:each={suiteOptions} for:item="opt">
                                <option key={opt.value} value={opt.value}>{opt.label}</option>
                            </template>
                        </select>
                        <svg class="select-chevron" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M1 1l4 4 4-4"></path>
                        </svg>
                    </div>
                </div>

                <!-- Runner selector row -->
                <div class="runner-row">
                    <span class="runner-via-lbl">via</span>
                    <div class="runner-seg">
                        <template for:each={runnerOptions} for:item="r">
                            <button key={r.value}
                                    class={r.btnClass}
                                    data-runner={r.value}
                                    onclick={handleRunnerChange}
                                    disabled={isRunning}
                                    title={r.title}>
                                {r.label}
                            </button>
                        </template>
                    </div>
                </div>

                <!-- Primary action row: run + cancel -->
                <div class="run-action-row">
                    <button class={runBtnClass} onclick={handleRunTests} disabled={runButtonDisabled} title={runButtonLabel}>
                        <template if:true={isCreating}>
                            <span class="btn-spinner"></span>
                        </template>
                        <template if:false={isCreating}>
                            <template if:true={isRunning}>
                                <span class="btn-pulse-ring"></span>
                            </template>
                            <template if:false={isRunning}>
                                <svg class="btn-icon-svg" viewBox="0 0 16 16" fill="currentColor">
                                    <path d="M3 2.5l10 5.5-10 5.5z"/>
                                </svg>
                            </template>
                        </template>
                        {runButtonLabel}
                    </button>

                    <template if:true={activeRunId}>
                        <button class="btn btn-cancel-compact"
                                onclick={handleCancel}
                                disabled={cancelButtonDisabled}
                                title="Cancel run">
                            <svg class="btn-icon-svg" viewBox="0 0 16 16" fill="currentColor">
                                <rect x="3" y="3" width="10" height="10" rx="1"/>
                            </svg>
                        </button>
                    </template>
                </div>
            </div>

            <!-- Pass rate bar -->
            <div class="pass-rate-section">
                <div class="pass-rate-header">
                    <span class="pass-rate-title">PASS RATE</span>
                    <span class="pass-rate-pct">{runPassRate.label} &nbsp; {runPassRate.percent}%</span>
                </div>
                <div class="pass-rate-bar">
                    <div class={passRateClass} style={passRateBarStyle}></div>
                </div>
            </div>

            <!-- Recent runs list -->
            <div class="history-list-header">
                <span class="history-list-title">RECENT RUNS</span>
                <template if:true={isLoadingHistory}>
                    <span class="loading-dots">
                        <span></span><span></span><span></span>
                    </span>
                </template>
            </div>

            <ul class="history-list">
                <template for:each={sidebarRuns} for:item="run">
                    <li key={run.id}
                        class={run.historyItemClass}
                        data-id={run.id}
                        onclick={handleHistoryRowClick}>
                        <template if:true={run.isPlaceholder}>
                            <span class="row-spinner"></span>
                        </template>
                        <span class={run.dotClass}></span>
                        <span class="hi-name">{run.name}</span>
                        <span class="hi-dur">{run.durationDisplay}</span>
                        <span class="hi-date">{run.createdDateDisplay}</span>
                    </li>
                </template>
                <template if:false={hasHistory}>
                    <li class="history-empty">No runs yet</li>
                </template>
            </ul>

            <!-- Footer -->
            <div class="sidebar-footer">
                <button class="btn btn-ghost btn-sm" onclick={handleToggleTheme} title={themeLabel}>
                    <template if:true={isDarkMode}>
                        <svg class="btn-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                    </template>
                    <template if:false={isDarkMode}>
                        <svg class="btn-icon-svg" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </template>
                    {themeLabel}
                </button>
                <button class="btn btn-ghost btn-sm" onclick={handleRefreshHistory}>
                    <svg class="btn-icon-svg" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M13.5 8A5.5 5.5 0 1 1 8 2.5" stroke-linecap="round"/>
                        <path d="M8 .5L11 3 8 5.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Refresh
                </button>
            </div>

        </div>

        <!-- ══════════════════════════════════════════════════════════════════
             MAIN PANEL
             ══════════════════════════════════════════════════════════════════ -->
        <div class="main-panel">

            <!-- No run selected -->
            <template if:false={activeRunId}>
                <div class="no-run-state">
                    <div class="no-run-icon">🧪</div>
                    <p class="no-run-text">Select a suite and click <strong>Run Tests</strong>, or pick a run from the sidebar.</p>
                </div>
            </template>

            <!-- Run detail -->
            <template if:true={activeRunId}>

                <!-- ── Run header (sticky, single horizontal row) ────────── -->
                <div class="run-header-wrap">
                    <div class="run-header">

                        <!-- Left: ID chip + status badge + live indicator -->
                        <div class="rh-id-group">
                            <span class="run-id-chip">{activeRun.name}</span>
                            <span class={statusBadgeClass}>{activeRun.status}</span>
                            <template if:true={isRunning}>
                                <span class="live-dot" title="In progress"></span>
                            </template>
                        </div>

                        <!-- Center: suite + agent -->
                        <div class="rh-suite-group">
                            <span class="run-suite-tag">{activeRun.testSuite}</span>
                            <template if:true={activeRun.agentId}>
                                <span class="rh-agent-badge">{activeRun.agentId}</span>
                            </template>
                            <template if:true={activeRun.requestedByName}>
                                <span class="rh-requester">by {activeRun.requestedByName}</span>
                            </template>
                        </div>

                        <!-- Right: Q → S → F timeline -->
                        <div class="rh-ts-group">
                            <span class="rh-ts">
                                <span class="rh-ts-lbl">Q</span>
                                <span class="rh-ts-val">{activeRunCreatedAt}</span>
                            </span>
                            <template if:true={activeRun.startedAt}>
                                <span class="rh-ts-arr">›</span>
                                <span class="rh-ts">
                                    <span class="rh-ts-lbl">S</span>
                                    <span class="rh-ts-val">{activeRunStartedAt}</span>
                                </span>
                            </template>
                            <template if:true={activeRun.completedAt}>
                                <span class="rh-ts-arr">›</span>
                                <span class="rh-ts rh-ts-done">
                                    <span class="rh-ts-lbl">F</span>
                                    <span class="rh-ts-val">{activeRunCompletedAt}</span>
                                </span>
                            </template>
                        </div>

                    </div>

                    <!-- Status pills (info / warn / error) -->
                    <template if:true={waitingForAgent}>
                        <div class="run-pill run-pill-info">
                            <svg class="msg-icon" viewBox="0 0 16 16" fill="currentColor">
                                <path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 3.5a.75.75 0 1 1 0 1.5.75.75 0 0 1 0-1.5zm0 2.5a.5.5 0 0 1 .5.5v4a.5.5 0 0 1-1 0V7.5A.5.5 0 0 1 8 7z"/>
                            </svg>
                            Waiting for the local qtc-runner agent to pick up this job…
                        </div>
                    </template>
                    <template if:true={showStuckWarning}>
                        <div class="run-pill run-pill-warn">
                            <svg class="msg-icon" viewBox="0 0 16 16" fill="currentColor">
                                <path d="M8 1L15 14H1L8 1zm0 3.5v4.25h-.5l-.5.25v.75h2v-.75l-.5-.25H8V4.5h.001zm-1 7.25a1 1 0 1 0 2 0 1 1 0 0 0-2 0z"/>
                            </svg>
                            <strong>Agent not responding.</strong> Runner in-progress for over 22 min. Check agent logs or restart.
                        </div>
                    </template>
                    <template if:true={activeRun.errorMessage}>
                        <div class="run-pill run-pill-error">
                            <svg class="msg-icon" viewBox="0 0 16 16" fill="currentColor">
                                <path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm-.75 3.5h1.5v5h-1.5v-5zm.75 7.5a.875.875 0 1 1 0-1.75.875.875 0 0 1 0 1.75z"/>
                            </svg>
                            {activeRun.errorMessage}
                        </div>
                    </template>
                </div>

                <!-- ── Metric strip (spans full width) ──────────────────── -->
                <template if:true={hasMetricStrip}>
                    <div class="metric-strip">
                        <template for:each={metricStripItems} for:item="ms">
                            <div key={ms.id} class="ms-item">
                                <div class={ms.valueClass}>{ms.value}</div>
                                <div class="ms-lbl">{ms.label}</div>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- ── Tab bar ─────────────────────────────────────────── -->
                <div class="tab-bar">
                    <template for:each={tabs} for:item="tab">
                        <button key={tab.id}
                                class={tab.btnClass}
                                data-tab={tab.id}
                                onclick={handleTabClick}>
                            <span class="tab-icon">{tab.icon}</span>
                            <span class="tab-label">{tab.label}</span>
                            <template if:true={tab.badge}>
                                <span class={tab.badgeClass}>{tab.badge}</span>
                            </template>
                        </button>
                    </template>
                </div>

                <!-- ── Tab panel ────────────────────────────────────────── -->
                <div class="tab-panel">

                    <!-- ── Screenshots ──────────────────────────────────── -->
                    <template if:true={activeTabIsScreenshots}>

                        <template if:true={hasVideo}>
                            <div class="video-section">
                                <div class="video-section-hdr">
                                    <span>🎬 Test Recording</span>
                                    <a class="video-dl-btn" href={videoSrc} target="_blank">⬇ Download</a>
                                </div>
                                <video class="test-video" controls preload="metadata" src={videoSrc}></video>
                            </div>
                        </template>

                        <template if:true={hasImages}>
                            <div class="screenshot-grid">
                                <template for:each={activeRunImages} for:item="img" for:index="idx">
                                    <div key={img.id}
                                         class="screenshot-wrap"
                                         data-index={idx}
                                         onclick={handleImageClick}
                                         role="button"
                                         tabindex="0">
                                        <img class="screenshot-img" src={img.downloadUrl} alt={img.title} />
                                        <div class="screenshot-footer">
                                            <span class="screenshot-lbl">{img.title}</span>
                                            <span class="screenshot-zoom-hint">🔍</span>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
                        <template if:false={hasImages}>
                            <div class="tab-empty">
                                <span>📷</span>
                                <p>No screenshots yet for this run.</p>
                            </div>
                        </template>
                    </template>

                    <!-- ── UI↔DB Cross-Check ─────────────────────────────── -->
                    <template if:true={activeTabIsCrosscheck}>
                        <template if:true={hasMismatchRows}>
                            <div class="tbl-wrap">
                                <table class="data-table">
                                    <thead>
                                        <tr>
                                            <th class="col-idx">#</th>
                                            <th class="col-product">Product</th>
                                            <th class="col-num">Seg</th>
                                            <th class="col-num">UI Before</th>
                                            <th class="col-num">UI After</th>
                                            <th class="col-num">DB Prior</th>
                                            <th class="col-num">DB After</th>
                                            <th class="col-match">Match</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template for:each={richMismatchRows} for:item="mx">
                                            <tr key={mx.keyId} class={mx.rowClass}>
                                                <td class="td-idx">{mx.idx}</td>
                                                <td class="td-product">{mx.product}</td>
                                                <td class="td-num td-muted">{mx.segOcc}</td>
                                                <td class="td-num">{mx.uiBefore}</td>
                                                <td class="td-num td-bold">{mx.uiAfter}</td>
                                                <td class="td-num td-muted">{mx.dbPrior}</td>
                                                <td class="td-num td-bold">{mx.dbAfter}</td>
                                                <td class="td-match">{mx.statusIcon}</td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </template>
                        <template if:false={hasMismatchRows}>
                            <div class="tab-empty"><span>🔀</span><p>No cross-check data for this run.</p></div>
                        </template>
                    </template>

                    <!-- ── DB Lines ─────────────────────────────────────── -->
                    <template if:true={activeTabIsDb}>
                        <template if:true={hasRichDbRows}>
                            <div class="tbl-wrap">
                                <table class="data-table data-table-sm">
                                    <thead>
                                        <tr>
                                            <th class="col-idx">#</th>
                                            <th class="col-product">Product</th>
                                            <th class="col-num">Seg</th>
                                            <th class="col-num">Prior Qty</th>
                                            <th class="col-num">DB Qty</th>
                                            <th class="col-num">Cust Price</th>
                                            <th class="col-num">Discount</th>
                                            <th class="col-num">Net Total</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template for:each={richDbRows} for:item="row">
                                            <tr key={row.keyId}>
                                                <td class="td-idx">{row.index}</td>
                                                <td class="td-product">
                                                    {row.product}
                                                    <template if:true={row.isBundleBool}>
                                                        <span class="bundle-tag">bundle</span>
                                                    </template>
                                                </td>
                                                <td class="td-num td-mono">{row.segIndexFmt}</td>
                                                <td class="td-num td-mono td-muted">{row.priorQtyFmt}</td>
                                                <td class="td-num td-mono td-bold td-blue">{row.dbQty}</td>
                                                <td class="td-num td-mono">{row.custPriceFmt}</td>
                                                <td class="td-num td-mono">{row.discountFmt}</td>
                                                <td class="td-num td-mono">{row.netTotalFmt}</td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </template>
                        <template if:false={hasRichDbRows}>
                            <div class="tab-empty"><span>🗄️</span><p>No DB verification data for this run.</p></div>
                        </template>
                    </template>

                    <!-- ── Metrics ─────────────────────────────────────── -->
                    <template if:true={activeTabIsMetrics}>
                        <template if:true={hasRichResults}>
                            <div class="kpi-grid">
                                <template for:each={richSummaryKpis} for:item="kpi">
                                    <div key={kpi.id} class="kpi-card">
                                        <div class="kpi-lbl">{kpi.label}</div>
                                        <div class={kpi.valClass}>{kpi.value}</div>
                                    </div>
                                </template>
                            </div>
                        </template>
                        <template if:true={hasRichMetrics}>
                            <div class="section-hdr">💰 Header Metrics — Before / After Save</div>
                            <div class="tbl-wrap">
                                <table class="data-table">
                                    <thead>
                                        <tr>
                                            <th class="col-product">Metric</th>
                                            <th class="col-num">Before Save</th>
                                            <th class="col-num">After Save</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template for:each={richMetrics} for:item="m">
                                            <tr key={m.id}>
                                                <td class="td-product td-bold">{m.label}</td>
                                                <td class="td-num td-mono">{m.before}</td>
                                                <td class="td-num td-mono td-green">{m.after}</td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </template>
                        <template if:true={hasRichLineRows}>
                            <div class="section-hdr">
                                ✅ Line Quantity Assertions
                                <span class="section-count">{richLineRows.length} lines</span>
                            </div>
                            <div class="tbl-wrap">
                                <table class="data-table">
                                    <thead>
                                        <tr>
                                            <th class="col-idx">#</th>
                                            <th class="col-product">Product / Segment</th>
                                            <th class="col-num">Before</th>
                                            <th class="col-num">Expected</th>
                                            <th class="col-num">Actual</th>
                                            <th class="col-num">Delta</th>
                                            <th class="col-match">Result</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template for:each={richLineRows} for:item="row">
                                            <tr key={row.keyId} class={row.rowClass}>
                                                <td class="td-idx">{row.index}</td>
                                                <td class="td-product">{row.label}</td>
                                                <td class="td-num td-mono">{row.before}</td>
                                                <td class="td-num td-mono">{row.expected}</td>
                                                <td class="td-num td-mono">{row.actual}</td>
                                                <td class="td-num td-mono td-green">{row.deltaStr}</td>
                                                <td class="td-match">{row.statusText}</td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </template>
                        <template if:false={hasRichResults}>
                            <div class="tab-empty"><span>💰</span><p>No metrics data for this run.</p></div>
                        </template>
                    </template>

                    <!-- ── Anomalies ─────────────────────────────────────── -->
                    <template if:true={activeTabIsAnomalies}>
                        <template if:true={hasRichAnomalies}>
                            <div class="tbl-wrap">
                                <table class="data-table">
                                    <thead>
                                        <tr>
                                            <th class="col-sev">Severity</th>
                                            <th class="col-type">Type</th>
                                            <th>Detail</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template for:each={richAnomalyRows} for:item="row">
                                            <tr key={row.keyId}>
                                                <td><span class={row.badgeClass}>{row.severity}</span></td>
                                                <td class="td-type">{row.type}</td>
                                                <td class="td-detail">{row.detail}</td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </template>
                        <template if:false={hasRichAnomalies}>
                            <div class="tab-empty tab-empty-ok"><span>✅</span><p>No anomalies detected in this run.</p></div>
                        </template>
                    </template>

                    <!-- ── Spec (Playwright test results) ────────────────── -->
                    <template if:true={activeTabIsSpec}>
                        <template if:true={hasTestResults}>
                            <div class="tbl-wrap">
                                <table class="data-table">
                                    <thead>
                                        <tr>
                                            <th class="col-product">Test Name</th>
                                            <th class="col-status">Status</th>
                                            <th class="col-dur">Duration</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template for:each={activeRun.testResults} for:item="tr">
                                            <tr key={tr.id} class={tr.rowClass}>
                                                <td class="td-product">{tr.testName}</td>
                                                <td><span class={tr.statusClass}>{tr.status}</span></td>
                                                <td class="td-dur td-mono">{tr.durationDisplay}</td>
                                            </tr>
                                            <template if:true={tr.hasError}>
                                                <tr key={tr.id} class="tr-error-row">
                                                    <td colspan="3" class="td-error-inline">
                                                        <span class="error-label">↳ Error:</span> {tr.errorMessage}
                                                    </td>
                                                </tr>
                                            </template>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </template>
                        <template if:false={hasTestResults}>
                            <div class="tab-empty"><span>🎭</span><p>No spec results yet for this run.</p></div>
                        </template>
                    </template>

                    <!-- ── Log ───────────────────────────────────────────── -->
                    <template if:true={activeTabIsLog}>
                        <template if:true={hasLogOutput}>
                            <div class="log-output-wrap">
                                <pre class="log-output">{logOutputText}</pre>
                            </div>
                        </template>
                        <template if:false={hasLogOutput}>
                            <div class="tab-empty"><span>📋</span><p>No log output for this run.</p></div>
                        </template>
                    </template>

                </div>
                <!-- /tab-panel -->

            </template>
            <!-- /if:true={activeRunId} -->

        </div>
        <!-- /main-panel -->

    </div>

    <!-- ══════════════════════════════════════════════════════════════════
         Screenshot Lightbox
         ══════════════════════════════════════════════════════════════════ -->
    <template if:true={lightboxOpen}>
        <!-- eslint-disable-next-line -->
        <div class="lb-overlay"
             onclick={handleOverlayClick}
             onkeydown={handleLightboxKeydown}
             tabindex="-1"
             role="dialog"
             aria-modal="true"
             aria-label={lightboxTitle}>
            <div class="lb-box">
                <div class="lb-header">
                    <span class="lb-title">{lightboxTitle}</span>
                    <span class="lb-counter">{lightboxCounter}</span>
                    <button class="lb-close" onclick={handleCloseLightbox} title="Close (Esc)">✕</button>
                </div>
                <div class="lb-img-wrap">
                    <img class="lb-img" src={lightboxSrc} alt={lightboxTitle} />
                </div>
                <template if:true={lightboxHasPrev}>
                    <button class="lb-nav lb-prev" onclick={handleLightboxPrev} title="Previous (←)">&#8249;</button>
                </template>
                <template if:true={lightboxHasNext}>
                    <button class="lb-nav lb-next" onclick={handleLightboxNext} title="Next (→)">&#8250;</button>
                </template>
            </div>
        </div>
    </template>

</template>
